services:
  - type: web
    name: pousada-maori-chatbot
    env: python
    buildCommand: pip install -r requirements.txt && python -m spacy download pt_core_news_md
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: PORT
        value: 5000
